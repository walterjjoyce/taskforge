<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskForge × Voltaire">
<meta name="theme-color" content="#0a0a0b">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>TaskForge × Voltaire ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --surface-hover: #1c1c20;
    --border: #2a2a30;
    --text: #e8e6e3;
    --text-muted: #6b6a6f;
    --accent: #f0c040;
    --accent-dim: #f0c04020;
    --danger: #e05555;
    --danger-dim: #e0555520;
    --success: #4ecb71;
    --success-dim: #4ecb7120;
    --tag-blue: #5b9bf5;
    --tag-purple: #a78bfa;
    --tag-orange: #f59e42;
    --tag-pink: #f472b6;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: calc(24px + var(--safe-top)) 20px calc(100px + var(--safe-bottom));
  }

  /* HEADER */
  .header { margin-bottom: 36px; }

  .header h1 {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 2.6rem;
    letter-spacing: -1px;
    line-height: 1;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeInUp 0.6s ease-out;
  }

  .header h1 .voltaire-mark {
    font-family: 'Playfair Display', serif;
    font-size: 0.62em;
    font-weight: 700;
    letter-spacing: -0.4px;
    opacity: 0.72;
  }

  .header h1 .voltaire-mark .bolt { margin-left: 3px; font-size: 0.92em; }

  .header .subtitle {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeInUp 0.6s ease-out 0.1s both;
  }

  .stats-bar {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    animation: fadeInUp 0.6s ease-out 0.2s both;
  }

  .stat { display: flex; align-items: baseline; gap: 5px; }

  .stat-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* SYNC STATUS */
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 0.68rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    animation: fadeInUp 0.6s ease-out 0.25s both;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--success); }
  .sync-dot.error { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* INPUT AREA */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    transition: border-color 0.3s, box-shadow 0.3s;
    animation: fadeInUp 0.6s ease-out 0.3s both;
  }

  .input-area:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .input-area input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    font-weight: 400;
  }

  .input-area input::placeholder { color: var(--text-muted); font-weight: 300; }

  .add-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 7px;
    padding: 12px 18px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .add-btn:active { transform: scale(0.95); filter: brightness(0.9); }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* OPTIONS ROW */
  .options-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
    animation: fadeInUp 0.6s ease-out 0.35s both;
  }

  .priority-btn, .tag-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    user-select: none;
  }

  .priority-btn.active { border-color: var(--danger); color: var(--danger); background: var(--danger-dim); }
  .tag-btn.active[data-tag="Work"] { border-color: var(--tag-blue); color: var(--tag-blue); }
  .tag-btn.active[data-tag="Personal"] { border-color: var(--tag-purple); color: var(--tag-purple); }
  .tag-btn.active[data-tag="Urgent"] { border-color: var(--tag-orange); color: var(--tag-orange); }
  .tag-btn.active[data-tag="Ideas"] { border-color: var(--tag-pink); color: var(--tag-pink); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 3px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    animation: fadeInUp 0.6s ease-out 0.4s both;
  }

  .filter-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .filter-btn.active { color: var(--accent); background: var(--accent-dim); }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-bottom: 16px;
    animation: fadeInUp 0.6s ease-out 0.45s both;
  }

  .progress-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: right;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* TASK LIST */
  .task-list { display: flex; flex-direction: column; gap: 5px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: all 0.2s ease;
    cursor: default;
    animation: slideIn 0.3s ease-out both;
    position: relative;
    overflow: hidden;
  }

  .task-item.completed { opacity: 0.4; }
  .task-item.completed .task-text { text-decoration: line-through; }
  .task-item.removing { animation: slideOut 0.3s ease-in forwards; }
  .task-item.saving { opacity: 0.6; }

  .checkbox {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .checkbox.checked { background: var(--success); border-color: var(--success); }

  .checkbox.checked::after {
    content: '✓';
    color: var(--bg);
    font-size: 14px;
    font-weight: 700;
  }

  .task-content { flex: 1; min-width: 0; }

  .task-text {
    font-size: 0.9rem;
    font-weight: 400;
    line-height: 1.4;
    transition: all 0.3s;
  }

  .task-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }

  .task-tag {
    font-size: 0.62rem;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .task-tag.Work { background: #5b9bf520; color: var(--tag-blue); }
  .task-tag.Personal { background: #a78bfa20; color: var(--tag-purple); }
  .task-tag.Urgent { background: #f59e4220; color: var(--tag-orange); }
  .task-tag.Ideas { background: #f472b620; color: var(--tag-pink); }
  .task-tag.priority { background: var(--danger-dim); color: var(--danger); }

  .task-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-muted);
    padding: 2px 7px;
    background: #ffffff08;
    border-radius: 4px;
  }

  .task-due {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.3px;
    font-weight: 500;
  }

  .task-due.overdue { background: var(--danger-dim); color: var(--danger); }
  .task-due.due-today { background: #f59e4230; color: var(--tag-orange); }
  .task-due.due-soon { background: #f0c04020; color: var(--accent); }
  .task-due.due-later { background: #ffffff08; color: var(--text-muted); }

  .date-picker-wrap { position: relative; display: flex; align-items: center; }

  .date-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .date-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .date-btn .clear-date {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text-muted);
    color: var(--bg);
    font-size: 0.55rem;
    font-weight: 700;
    margin-left: 2px;
    line-height: 1;
  }

  .hidden-date-input {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 6px 10px;
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .delete-btn:active { color: var(--danger); background: var(--danger-dim); }

  /* Loading skeleton */
  .skeleton {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .skeleton-box {
    background: linear-gradient(90deg, var(--border) 25%, var(--surface-hover) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 50px 20px; animation: fadeInUp 0.5s ease-out; }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.3; }
  .empty-state p { color: var(--text-muted); font-size: 0.85rem; font-weight: 300; }

  /* Error banner */
  .error-banner {
    background: var(--danger-dim);
    border: 1px solid var(--danger);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 0.78rem;
    color: var(--danger);
    margin-bottom: 16px;
    display: none;
  }

  .error-banner.visible { display: block; }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(40px); height: 0; padding: 0; margin: 0; overflow: hidden; }
  }

  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .checkbox.just-checked { animation: popIn 0.3s ease-out; }

  @media (max-height: 500px) {
    .header { margin-bottom: 20px; }
    .header h1 { font-size: 2rem; }
    .stats-bar { margin-top: 12px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1><span>TaskForge</span><span class="voltaire-mark">× Voltaire <span class="bolt">⚡</span></span></h1>
    <p class="subtitle">Shape your day with intention</p>
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Connecting...</span>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="input-area">
    <input type="text" id="taskInput" placeholder="What needs to be done?" />
    <button class="add-btn" id="addBtn">ADD</button>
  </div>

  <div class="options-row">
    <button class="priority-btn" id="priorityToggle">★ Priority</button>
    <button class="tag-btn" data-tag="Work">Work</button>
    <button class="tag-btn" data-tag="Personal">Personal</button>
    <button class="tag-btn" data-tag="Urgent">Urgent</button>
    <button class="tag-btn" data-tag="Ideas">Ideas</button>
    <div class="date-picker-wrap">
      <button class="date-btn" id="dateBtn">📅 Due date</button>
      <input type="date" class="hidden-date-input" id="dueDateInput" />
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="priority">Priority</button>
    <button class="filter-btn" data-filter="overdue">Overdue</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0% complete</div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const PROXY_URL = 'https://lucky-queen-22b1.walterjjoyce.workers.dev';
  const TABLE_ID  = '897036';
  const API_BASE  = `${PROXY_URL}/api/database/rows/table/${TABLE_ID}/`;

  // ── State ──
  let tasks = [];
  let currentFilter = 'all';
  let selectedTag = null;
  let isPriority = false;
  let selectedDueDate = null;

  // ── DOM refs ──
  const input         = document.getElementById('taskInput');
  const addBtn        = document.getElementById('addBtn');
  const taskList      = document.getElementById('taskList');
  const priorityToggle = document.getElementById('priorityToggle');
  const tagBtns       = document.querySelectorAll('.tag-btn');
  const filterBtns    = document.querySelectorAll('.filter-btn');
  const dateBtn       = document.getElementById('dateBtn');
  const dueDateInput  = document.getElementById('dueDateInput');
  const syncDot       = document.getElementById('syncDot');
  const syncLabel     = document.getElementById('syncLabel');
  const errorBanner   = document.getElementById('errorBanner');

  // ── Sync indicator ──
  function setSyncState(state, msg) {
    syncDot.className = 'sync-dot ' + state;
    syncLabel.textContent = msg;
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    setTimeout(() => errorBanner.classList.remove('visible'), 5000);
  }

  // ── Baserow API helpers ──
  async function apiGet(url) {
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) throw new Error(`GET ${res.status}`);
    return res.json();
  }

  async function apiPost(body) {
    const res = await fetch(API_BASE + '?user_field_names=true', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`POST ${res.status}`);
    return res.json();
  }

  async function apiPatch(id, body) {
    const res = await fetch(`${API_BASE}${id}/?user_field_names=true`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`PATCH ${res.status}`);
    return res.json();
  }

  async function apiDelete(id) {
    const res = await fetch(`${API_BASE}${id}/`, { method: 'DELETE' });
    if (!res.ok) throw new Error(`DELETE ${res.status}`);
  }

  // ── Map Baserow row → local task ──
  function rowToTask(row) {
    return {
      id:        row.id,
      text:      row.Task || '',
      completed: (row.Status || '').toLowerCase() === 'completed',
      tag:       row.Category || null,
      priority:  row.Priority === true || row.Priority === 'true',
      dueDate:   row.Due_Date ? row.Due_Date.split('T')[0] : null,
      notes:     row.Notes || '',
      createdOn: row.Created_On || null,
      time:      row.Created_On
                   ? new Date(row.Created_On).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                   : '',
      date:      row.Created_On
                   ? new Date(row.Created_On).toLocaleDateString([], { month: 'short', day: 'numeric' })
                   : ''
    };
  }

  // ── Load all tasks from Baserow ──
  async function loadTasks() {
    setSyncState('syncing', 'Loading...');
    showSkeleton();
    try {
      let allRows = [];
      let url = API_BASE + '?user_field_names=true&size=100&order_by=-id';
      while (url) {
        const data = await apiGet(url);
        allRows = allRows.concat(data.results || []);
        // Baserow paginates; follow next if present
        url = data.next ? data.next.replace('https://api.baserow.io', PROXY_URL) : null;
      }
      tasks = allRows.map(rowToTask);
      setSyncState('synced', `Synced · ${tasks.length} tasks`);
      render();
    } catch (err) {
      setSyncState('error', 'Connection error');
      showError('Could not load tasks. Check your proxy and Baserow token.');
      taskList.innerHTML = '';
      console.error(err);
    }
  }

  function showSkeleton() {
    taskList.innerHTML = [1,2,3].map(() => `
      <div class="skeleton">
        <div class="skeleton-box" style="width:24px;height:24px;border-radius:6px;flex-shrink:0"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:6px">
          <div class="skeleton-box" style="height:14px;width:70%"></div>
          <div class="skeleton-box" style="height:10px;width:40%"></div>
        </div>
      </div>`).join('');
  }

  // ── Add task ──
  async function addTask() {
    const text = input.value.trim();
    if (!text) return;

    addBtn.disabled = true;
    addBtn.textContent = '...';
    setSyncState('syncing', 'Saving...');

    const payload = {
      Task:     text,
      Status:   'Active',
      Category: selectedTag || null,
      Priority: isPriority,
      Due_Date: selectedDueDate || null,
      Notes:    ''
    };

    try {
      const row = await apiPost(payload);
      tasks.unshift(rowToTask(row));

      // Reset inputs
      input.value = '';
      isPriority = false;
      selectedTag = null;
      selectedDueDate = null;
      priorityToggle.classList.remove('active');
      tagBtns.forEach(b => b.classList.remove('active'));
      dateBtn.innerHTML = '📅 Due date';
      dateBtn.classList.remove('active');
      dueDateInput.value = '';

      setSyncState('synced', `Synced · ${tasks.length} tasks`);
      render();
      input.focus();
      if (navigator.vibrate) navigator.vibrate(10);
    } catch (err) {
      setSyncState('error', 'Save failed');
      showError('Could not save task. Please try again.');
      console.error(err);
    } finally {
      addBtn.disabled = false;
      addBtn.textContent = 'ADD';
    }
  }

  // ── Toggle complete ──
  async function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    const newCompleted = !task.completed;
    task.completed = newCompleted; // optimistic update
    render();

    setSyncState('syncing', 'Saving...');
    try {
      await apiPatch(id, { Status: newCompleted ? 'Completed' : 'Active' });
      setSyncState('synced', `Synced · ${tasks.length} tasks`);
      if (navigator.vibrate) navigator.vibrate(newCompleted ? [10, 30, 10] : 10);
    } catch (err) {
      task.completed = !newCompleted; // rollback
      setSyncState('error', 'Update failed');
      showError('Could not update task status.');
      render();
      console.error(err);
    }
  }

  // ── Delete task ──
  async function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('removing');

    setSyncState('syncing', 'Deleting...');
    try {
      await apiDelete(id);
      tasks = tasks.filter(t => t.id !== id);
      setSyncState('synced', `Synced · ${tasks.length} tasks`);
      setTimeout(() => render(), 280);
    } catch (err) {
      if (el) el.classList.remove('removing');
      setSyncState('error', 'Delete failed');
      showError('Could not delete task.');
      console.error(err);
    }
  }

  // ── Due date helpers ──
  function getDueStatus(dueDate) {
    if (!dueDate) return null;
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const due   = new Date(dueDate + 'T00:00:00');
    const diff  = Math.floor((due - today) / 86400000);
    if (diff < 0)  return 'overdue';
    if (diff === 0) return 'due-today';
    if (diff <= 3)  return 'due-soon';
    return 'due-later';
  }

  function formatDueDate(dueDate) {
    const d     = new Date(dueDate + 'T00:00:00');
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff  = Math.floor((d - today) / 86400000);
    if (diff === 0)  return 'Today';
    if (diff === 1)  return 'Tomorrow';
    if (diff === -1) return 'Yesterday';
    if (diff < -1)   return `${Math.abs(diff)}d overdue`;
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  // ── Render ──
  function render() {
    let filtered = tasks;
    if (currentFilter === 'active')    filtered = tasks.filter(t => !t.completed);
    if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
    if (currentFilter === 'priority')  filtered = tasks.filter(t => t.priority);
    if (currentFilter === 'overdue')   filtered = tasks.filter(t => !t.completed && t.dueDate && getDueStatus(t.dueDate) === 'overdue');

    filtered = [...filtered].sort((a, b) => {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      if (a.priority  !== b.priority)  return b.priority  ? 1 : -1;
      if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
      if (a.dueDate && !b.dueDate) return -1;
      if (!a.dueDate && b.dueDate) return 1;
      return b.id - a.id;
    });

    if (filtered.length === 0) {
      taskList.innerHTML = `
        <div class="empty-state">
          <div class="icon">✦</div>
          <p>${currentFilter === 'all' ? 'Your slate is clean. Add a task to begin.' : 'No tasks match this filter.'}</p>
        </div>`;
    } else {
      taskList.innerHTML = filtered.map((t, i) => {
        const dueStatus = t.dueDate ? getDueStatus(t.dueDate) : null;
        const dueLabel  = t.dueDate ? formatDueDate(t.dueDate) : '';
        const tagClass  = t.tag ? t.tag : '';
        return `
        <div class="task-item ${t.completed ? 'completed' : ''}" data-id="${t.id}" style="animation-delay:${i * 0.03}s">
          <div class="checkbox ${t.completed ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
          <div class="task-content">
            <div class="task-text">${escapeHtml(t.text)}</div>
            <div class="task-meta">
              ${t.priority ? '<span class="task-tag priority">★ Priority</span>' : ''}
              ${t.tag ? `<span class="task-tag ${tagClass}">${t.tag}</span>` : ''}
              ${t.dueDate ? `<span class="task-due ${dueStatus}">📅 ${dueLabel}</span>` : ''}
              ${t.date ? `<span class="task-time">${t.date} ${t.time}</span>` : ''}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteTask(${t.id})" aria-label="Delete task">✕</button>
        </div>`;
      }).join('');
    }

    const total   = tasks.length;
    const done    = tasks.filter(t => t.completed).length;
    const overdue = tasks.filter(t => !t.completed && t.dueDate && getDueStatus(t.dueDate) === 'overdue').length;

    document.getElementById('totalCount').textContent   = total;
    document.getElementById('doneCount').textContent    = done;
    document.getElementById('pendingCount').textContent = total - done;

    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = overdue > 0
      ? `${pct}% complete · ${overdue} overdue`
      : `${pct}% complete`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── Date picker ──
  dateBtn.addEventListener('click', (e) => {
    if (selectedDueDate && e.target.classList.contains('clear-date')) {
      selectedDueDate = null;
      dateBtn.innerHTML = '📅 Due date';
      dateBtn.classList.remove('active');
      return;
    }
    dueDateInput.showPicker ? dueDateInput.showPicker() : dueDateInput.click();
  });

  dueDateInput.addEventListener('change', () => {
    if (dueDateInput.value) {
      selectedDueDate = dueDateInput.value;
      const d = new Date(dueDateInput.value + 'T00:00:00');
      const label = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      dateBtn.innerHTML = `📅 ${label} <span class="clear-date">✕</span>`;
      dateBtn.classList.add('active');
    }
  });

  // ── Tag selection ──
  tagBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      if (selectedTag === tag) {
        selectedTag = null;
        btn.classList.remove('active');
      } else {
        tagBtns.forEach(b => b.classList.remove('active'));
        selectedTag = tag;
        btn.classList.add('active');
      }
    });
  });

  // ── Priority toggle ──
  priorityToggle.addEventListener('click', () => {
    isPriority = !isPriority;
    priorityToggle.classList.toggle('active', isPriority);
  });

  // ── Filter selection ──
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  // ── Add task events ──
  addBtn.addEventListener('click', addTask);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── Boot ──
  loadTasks();
</script>
</body>
</html>
